<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetching BC Version</title>
    <style>
        body {
            background-color: #2f3542;
            color: #e0e0e0;
            font-size: 2rem;
            height: 100%;
        }

        #log-container {
            width: 100%;
            height: 60%;
            overflow-y: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .log-item {
            width: 90%;
            padding: 10px;
            text-align: center;
            opacity: 1;
            transition: opacity 0.5s ease-out, transform 0.5s ease;
        }
    </style>
</head>

<body>
    <div id="log-container"></div>
    <script>
        let logCounter = 0;

        function addLog(message) {
            const container = document.getElementById('log-container');

            const item = document.createElement('div');
            item.classList.add('log-item');
            item.textContent = message;

            container.appendChild(item);

            setTimeout(() => {
                const allLogs = document.querySelectorAll('.log-item');
                const len = allLogs.length;
                allLogs.forEach((log, index) => {
                    if (index < len - 1) {
                        log.style.opacity = 0.1;
                    }
                });
            }, 100);

            const itemHeight = item.offsetHeight;
            const containerHeight = container.offsetHeight;
            container.scrollTop = container.scrollHeight - containerHeight / 2 - itemHeight / 2;
        }

        window.addEventListener("fetching-bc-start", () => {
            addLog(electron.i18n("Preload::FetchingBCVersion"));
        });

        window.addEventListener("fetching-bc-done", (info) => {
            const [bcv] = info.detail;
            addLog(electron.i18n("Preload::FetchingBCVersionResult").replace("{version}", bcv.version));
        });

        window.addEventListener("fetching-bc-fb", (info) => {
            const [bcv] = info.detail;
            addLog(electron.i18n("Preload::FetchingBCVersionFallback").replace("{version}", bcv.version));
        });

        window.addEventListener("fetching-bc-fallback-start", () => {
            addLog(electron.i18n("Preload::FetchingBCVersionFallbackStart"));
        });

        window.addEventListener("fetching-bc-fallback-try", (info) => {
            const [data] = info.detail;
            addLog(
                electron.i18n("Preload::FetchingBCVersionFallbackTry")
                    .replace("{version}", data.version)
            );
        });

        window.addEventListener("fetching-bc-fallback-miss", (info) => {
            const [data] = info.detail;
            addLog(
                electron.i18n("Preload::FetchingBCVersionFallbackMiss")
                    .replace("{version}", data.version)
            );
        });

        window.addEventListener("fetching-bc-fallback-hit", (info) => {
            const [data] = info.detail;
            addLog(
                electron.i18n("Preload::FetchingBCVersionFallbackHit")
                    .replace("{version}", data.version)
            );
        });

        window.addEventListener("fetching-bc-fallback-unverified", (info) => {
            const [data] = info.detail;
            addLog(
                electron.i18n("Preload::FetchingBCVersionFallbackUnverified")
                    .replace("{version}", data.version)
            );
        });

        window.addEventListener("fetching-bc-error", (info) => {
            const [error] = info.detail;
            addLog(error);
        });
    </script>
</body>

</html>
