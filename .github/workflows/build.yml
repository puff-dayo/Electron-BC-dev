name: Build/release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name'
        required: true
        type: string

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-windows:
    runs-on: windows-2022
  
    env:
      GYP_MSVS_VERSION: 2022
      npm_config_msvs_version: 2022
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"
  
      - name: Fetch full history
        run: git fetch --unshallow --recurse-submodules=no
  
      - name: Install pnpm
        uses: pnpm/action-setup@v4
  
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
  
      - name: Run install
        run: pnpm install --frozen-lockfile
  
      - name: Run compile
        run: pnpm run compile:prod
  
      - name: Run changelog
        run: pnpm run changelog
  
      - name: Build/release Electron app
        run: pnpm run dist:windows

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Fetch full history
        run: git fetch --unshallow --recurse-submodules=no

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Run install
        run: pnpm install --frozen-lockfile

      - name: Run compile
        run: pnpm run compile:prod

      - name: Run changelog
        run: pnpm run changelog

      - name: Build/release Electron app (Linux)
        run: pnpm run dist:linux

  release-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            script: dist:mac
          - name: macOS x64 Intel
            os: macos-15-intel
            script: dist:mac:x64

    name: release-${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Fetch full history
        run: git fetch --unshallow --recurse-submodules=no

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Run install
        run: pnpm install --frozen-lockfile

      - name: Run compile
        run: pnpm run compile:prod

      - name: Run changelog
        run: pnpm run changelog

      - name: Build/release Electron app
        run: pnpm run ${{ matrix.script }}

  finalize-release:
    runs-on: ubuntu-latest

    needs: [release-windows, release-linux, release-macos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Run install
        run: pnpm install --frozen-lockfile

      - name: Publish release
        run: pnpm run gh-release
